<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="card">

<h2>⚙️ Admin Dashboard</h2>

{% for b in bookings %}

<div class="box">
<p><b>Name:</b> {{b.name}}</p>
<p><b>Vehicle:</b> {{b.vehicle}}</p>
<p><b>City:</b> {{b.city}}</p>
<p><b>Station:</b> {{b.station}}</p>
<p><b>Slot:</b> {{b.slot}}</p>
</div>

{% endfor %}

</div>

</body>
</html>
