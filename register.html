<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="card">

<h2>Register Vehicle</h2>

<form method="POST">

<input name="name" placeholder="Full Name" required>

<input name="vehicle" placeholder="Vehicle Number" required>

<select name="city">
    <option>Nagpur</option>
    <option>Mumbai</option>
    <option>Delhi</option>
</select>

<input name="location" placeholder="Current Location (e.g. Raghuji Nagar)" required>

<button type="submit">Find Stations</button>

</form>

</div>

</body>
</html>
